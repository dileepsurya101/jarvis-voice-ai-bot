name: CI - Lint, Type Check & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Check Prettier formatting
        run: npm run format:check
        continue-on-error: true

      - name: TypeScript type check
        run: npm run type-check
        continue-on-error: false

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          # Use placeholder values for tests (mocked in test environment)
          MONGODB_URI: mongodb://localhost:27017/jarvis_test
          GROQ_API_KEY: test_key_placeholder
          OPENWEATHER_API_KEY: test_key_placeholder
          DEFAULT_CITY: Mumbai

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build:client

      - name: Build server
        run: npm run build:server

      - name: Verify build artifacts
        run: |
          echo "Checking client build..."
          ls -la client/dist/ || echo "Client dist not found - check build config"
          echo "Checking server build..."
          ls -la server/dist/ || echo "Server dist not found - check build config"
